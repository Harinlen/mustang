[tool.uv.workspace]
members = ["src/kernel", "src/probe"]

[tool.uv.sources]
mustang-kernel = { workspace = true }
mustang-probe = { workspace = true }

[dependency-groups]
dev = [
    "ruff>=0.11",
    "mypy>=1.15",
    "pytest>=9.0",
    "pytest-asyncio>=1.0",
    "pytest-cov>=7.0",
    "bandit>=1.8",
    "types-PyYAML>=6.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "e2e: end-to-end tests requiring a live kernel subprocess",
    "core: kernel boot, session, auth, model — pytest -m 'e2e and core'",
    "tools: built-in tools (bash, file, todo, web_fetch, monitor, etc.) — pytest -m 'e2e and tools'",
    "skills: skill subsystem — pytest -m 'e2e and skills'",
    "mcp: MCP server integration — pytest -m 'e2e and mcp'",
    "memory: memory subsystem — pytest -m 'e2e and memory'",
    "orchestrator: orchestrator hooks, plan mode, REPL — pytest -m 'e2e and orchestrator'",
    "git: git/worktree subsystem — pytest -m 'e2e and git'",
    "schedule: schedule/cron subsystem (LLM-heavy) — pytest -m 'e2e and schedule'",
]
addopts = "-m 'not e2e'"

[tool.ruff]
target-version = "py312"
line-length = 100
